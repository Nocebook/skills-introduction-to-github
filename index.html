<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小7の音乐卡片</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}
body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}
.music-card {
    width: 370px;
    height: 200px;
    border-radius: 20px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}
@media (prefers-color-scheme: light) {
    .music-card { background: rgba(255,255,255,0.4); color: #000; }
    #progressBar { background: #eee; }
    .playlist-pop { background: #fff; border:1px solid #eee; }
    .playlist-item:hover { background: #f5f5f5; }
    .add-music-btn, .small-btn { background: #f0f0f0; color: #000; }
    .delete-btn { color: #999; }
    .delete-btn:hover { color: #e53e3e; }
    .clear-all-btn { color:#999; border-top:1px solid #eee; }
    .lyric-area { background: rgba(0,0,0,0.04); color: #444; }
    .lyric-line.active { color: #007aff; }
    .source-toggle { background: rgba(0,122,255,0.15); color:#007aff; }
    .toggle-hint { background: rgba(0,0,0,0.7); color: #fff; }
    #searchDialog { background: #fff; color: #000; border: 1px solid #eee; }
}
@media (prefers-color-scheme: dark) {
    .music-card { background: #202020; color: #fff; }
    #progressBar { background: #333; }
    .playlist-pop { background: #1a1a1a; border:1px solid #333; }
    .playlist-item:hover { background: #2a2a2a; }
    .add-music-btn, .small-btn { background: #2c2c2c; color: #fff; }
    .delete-btn { color: #888; }
    .delete-btn:hover { color: #f56565; }
    .clear-all-btn { color:#aaa; border-top:1px solid #333; }
    .lyric-area { background: rgba(255,255,255,0.05); color: #ccc; }
    .lyric-line.active { color: #ff9f0a; }
    .source-toggle { background: rgba(236,72,54,0.18); color:#ec483e; }
    .toggle-hint { background: rgba(0,0,0,0.75); color: #f0f0f0; }
    #searchDialog { background: #202020; color: #fff; border: 1px solid #333; }
}
.top-row {
    display: flex;
    gap: 12px;
    align-items: center;
}
.cover {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    object-fit: cover;
    cursor: pointer;
    background: #666;
    flex-shrink: 0;
}
.info {
    flex: 1;
    min-width: 0;
}
.song-name {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.song-artist {
    font-size: 11px;
    opacity: 0.7;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.progress-row {
    margin: 6px 0 4px;
}
.time-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    margin-bottom: 4px;
}
#progressBar {
    width: 100%;
    height: 5px;
    -webkit-appearance: none;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
}
#progressBar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #888;
    border: 2px solid #fff;
    cursor: pointer;
}
.lyric-area {
    height: 48px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.4;
    text-align: center;
    border-radius: 10px;
    padding: 6px 4px;
    margin: 6px 0 4px;
    scroll-behavior: smooth;
}
.lyric-line {
    transition: all 0.1s;
    white-space: pre-wrap;
    word-break: break-word;
    padding: 2px 0;
}
.lyric-line.active {
    font-weight: 600;
    transform: scale(1.02);
}
.control-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
}
.ctrl-buttons {
    display: flex;
    gap: 16px;
    align-items: center;
}
.ctrl-btn {
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    font-size: 16px;
}
.play-btn {
    font-size: 24px;
}
.small-btn {
    border: none;
    border-radius: 999px;
    padding: 3px 8px;
    font-size: 10px;
    cursor: pointer;
}
.btn-group {
    display: flex;
    gap: 4px;
}
.playlist-pop {
    position: absolute;
    bottom: 48px;
    left: 12px;
    width: 220px;
    max-height: 150px;
    border-radius: 12px;
    padding: 6px;
    overflow-y: auto;
    display: none;
    z-index: 99;
}
.playlist-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 8px;
    font-size: 12px;
    border-radius: 8px;
    cursor: pointer;
}
.playlist-item.active {
    font-weight: 600;
    background: rgba(128,128,128,0.2);
}
.delete-btn {
    font-size: 16px;
    background: none;
    border: none;
    cursor: pointer;
}
#searchDialog {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 260px;
    border-radius: 20px;
    padding: 16px;
    z-index: 1000;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    display: none;
}
#searchKeyword {
    width: 100%;
    padding: 10px;
    border-radius: 40px;
    border: 1px solid #ccc;
    margin: 10px 0;
}
.source-toggle {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="music-card">
    <div class="top-row">
        <img id="cover" class="cover" src="">
        <div class="info">
            <div class="song-name" id="songName">未播放</div>
            <div class="song-artist" id="songArtist">点击搜索歌曲</div>
            <div class="progress-row">
                <div class="time-row">
                    <span id="curTime">00:00</span>
                    <span id="totalTime">00:00</span>
                </div>
                <input type="range" id="progressBar" min="0" max="100" value="0">
            </div>
        </div>
        <div id="sourceToggle" class="source-toggle">🎵 QQ音乐</div>
    </div>

    <div id="lyricArea" class="lyric-area">
        <div class="lyric-line">暂无歌词</div>
    </div>

    <div class="control-bar">
        <div class="ctrl-buttons">
            <button class="ctrl-btn" id="prevBtn">⏮</button>
            <button class="ctrl-btn play-btn" id="playBtn">▶</button>
            <button class="ctrl-btn" id="nextBtn">⏭</button>
        </div>
        <div class="btn-group">
            <button class="small-btn" id="searchBtn">🔍 搜歌</button>
        </div>
    </div>

    <div class="playlist-pop" id="playlistPop"></div>

    <div id="searchDialog">
        <div>搜索歌曲</div>
        <input type="text" id="searchKeyword" placeholder="输入歌名...">
        <button id="searchConfirm">搜索</button>
        <button id="searchCancel">取消</button>
    </div>
</div>

<audio id="audio"></audio>

<script>
// ==============================================
// 你自己的私有音乐源（我已经帮你填好了！）
// ==============================================
const API = "https://api.music.youran.eu.org";

const audio = document.getElementById("audio");
const songName = document.getElementById("songName");
const songArtist = document.getElementById("songArtist");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("playBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const progressBar = document.getElementById("progressBar");
const curTime = document.getElementById("curTime");
const totalTime = document.getElementById("totalTime");
const searchBtn = document.getElementById("searchBtn");
const searchDialog = document.getElementById("searchDialog");
const searchKeyword = document.getElementById("searchKeyword");
const searchConfirm = document.getElementById("searchConfirm");
const searchCancel = document.getElementById("searchCancel");
const sourceToggle = document.getElementById("sourceToggle");

let server = "tencent";
let playlist = [];
let current = 0;
let playing = false;

sourceToggle.onclick = () => {
    server = server === "tencent" ? "netease" : "tencent";
    sourceToggle.innerText = server === "tencent" ? "🎵 QQ音乐" : "☁️ 网易云";
};

searchBtn.onclick = () => {
    searchDialog.style.display = "block";
};

searchCancel.onclick = () => {
    searchDialog.style.display = "none";
};

searchConfirm.onclick = async () => {
    const kw = searchKeyword.value.trim();
    if (!kw) return;
    searchDialog.style.display = "none";

    const res = await fetch(`${API}/api?server=${server}&type=search&id=${kw}`);
    const data = await res.json();
    if (!data || data.length === 0) return alert("无结果");

    playlist = data.map(i => ({
        name: i.name || i.title,
        artist: i.artist || i.singer || "未知",
        url: i.url || i.music_url,
        cover: i.cover || i.pic,
        lrc: i.lrc || i.lyric
    }));

    current = 0;
    load(playlist[current]);
    play();
};

function load(song) {
    audio.src = song.url;
    songName.innerText = song.name;
    songArtist.innerText = song.artist;
    cover.src = song.cover || "";
}

function play() {
    audio.play();
    playing = true;
    playBtn.innerText = "⏸";
}

function pause() {
    audio.pause();
    playing = false;
    playBtn.innerText = "▶";
}

playBtn.onclick = () => {
    if (!audio.src) return;
    playing ? pause() : play();
};

prevBtn.onclick = () => {
    current = (current - 1 + playlist.length) % playlist.length;
    load(playlist[current]);
    play();
};

nextBtn.onclick = () => {
    current = (current + 1) % playlist.length;
    load(playlist[current]);
    play();
};

audio.ontimeupdate = () => {
    if (!audio.duration) return;
    progressBar.value = (audio.currentTime / audio.duration) * 100;
    curTime.innerText = fmt(audio.currentTime);
    totalTime.innerText = fmt(audio.duration);
};

progressBar.oninput = () => {
    audio.currentTime = (progressBar.value / 100) * audio.duration;
};

audio.onended = () => {
    nextBtn.onclick();
};

function fmt(t) {
    const m = Math.floor(t / 60).toString().padStart(2, "0");
    const s = Math.floor(t % 60).toString().padStart(2, "0");
    return `${m}:${s}`;
}
</script>
</body>
</html>
